<div class="max-w-2xl mx-auto p-6 bg-white shadow-lg rounded-xl mt-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Editar Perfil</h2>

  <form (ngSubmit)="guardarCambios()" #perfilForm="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- DNI -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">DNI</label>
      <input
        type="text"
        name="dni"
        [(ngModel)]="perfil.dni"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Nombre -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
      <input
        type="text"
        name="name"
        [(ngModel)]="perfil.name"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Apellido -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
      <input
        type="text"
        name="apellido"
        [(ngModel)]="perfil.apellido"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Dirección -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
      <input
        type="text"
        name="direccion"
        [(ngModel)]="perfil.direccion"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Teléfono -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
      <input
        type="text"
        name="telefono"
        [(ngModel)]="perfil.telefono"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Teléfono fijo -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono Fijo</label>
      <input
        type="text"
        name="tel_fijo"
        [(ngModel)]="perfil.tel_fijo"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="perfil.email"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
      />
    </div>

    <!-- Contraseña -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nueva Contraseña</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="perfil.password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
        placeholder="Dejar en blanco para no cambiar"
      />
    </div>

    <!-- Botones ocupando las dos columnas -->
    <div class="col-span-2 flex justify-end space-x-3 pt-4">
      <button
        type="button"
        class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400"
        (click)="ngOnInit()"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700"
      >
        Guardar Cambios
      </button>
    </div>

  </form>
</div>
