<div class="container mx-auto px-4">
  <section class="section">
    <div class="section-body">
      <h2 class="text-2xl font-semibold mb-4">Editar Usuario</h2>

      <!-- Botón Regresar -->
      <button 
        class="border border-cyan-600 text-cyan-600 bg-white hover:bg-cyan-50 px-4 py-2 rounded-md mb-4 flex items-center gap-2 transition"
        type="button" 
        (click)="goBack()">
        <i class="fas fa-arrow-left"></i> Regresar
      </button>

      <!-- Card -->
      <div class="shadow rounded-lg overflow-hidden">
        <div class="bg-cyan-500 px-4 py-3">
          <h5 class="text-lg font-semibold text-white">Formulario de Edición</h5>
        </div>

        <div class="p-6 bg-white">
          <form (ngSubmit)="updateUser()" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              
              <div>
                <label for="dni" class="block text-gray-700 font-medium">DNI</label>
                <input 
                  type="text" 
                  id="dni" 
                  [(ngModel)]="dni" 
                  name="dni" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="name" class="block text-gray-700 font-medium">Nombre</label>
                <input 
                  type="text" 
                  id="name" 
                  [(ngModel)]="name" 
                  name="name" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="apellido" class="block text-gray-700 font-medium">Apellidos</label>
                <input 
                  type="text" 
                  id="apellido" 
                  [(ngModel)]="apellido" 
                  name="apellido" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="direccion" class="block text-gray-700 font-medium">Dirección</label>
                <input 
                  type="text" 
                  id="direccion" 
                  [(ngModel)]="direccion" 
                  name="direccion" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="telefono" class="block text-gray-700 font-medium">Teléfono</label>
                <input 
                  type="text" 
                  id="telefono" 
                  [(ngModel)]="telefono" 
                  name="telefono" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="tel_fijo" class="block text-gray-700 font-medium">Teléfono Fijo</label>
                <input 
                  type="text" 
                  id="tel_fijo" 
                  [(ngModel)]="tel_fijo" 
                  name="tel_fijo" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="email" class="block text-gray-700 font-medium">Correo Electrónico</label>
                <input 
                  type="email" 
                  id="email" 
                  [(ngModel)]="email" 
                  name="email" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

              <div>
                <label for="password" class="block text-gray-700 font-medium">Contraseña</label>
                <input 
                  type="password" 
                  id="password" 
                  [(ngModel)]="password" 
                  name="password" 
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                  required>
              </div>

            </div>

            <!-- Botón Guardar -->
            <div class="text-right">
              <button 
                type="submit" 
                class="bg-cyan-700 hover:bg-cyan-800 text-white px-5 py-2 rounded-lg shadow transition flex items-center gap-2">
                <i class="fas fa-save"></i> Actualizar Usuario
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </section>
</div>
