<section class="flex items-center justify-center min-h-screen bg-gradient-to-br from-[#74ebd5] to-[#ACB6E5]">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <div class="mb-6 text-center">
      <h2 class="text-2xl font-semibold text-gray-800">Iniciar sesión</h2>
    </div>
    <div>
      <div *ngIf="errorMessage" class="text-red-700 p-2 text-sm">
  {{ errorMessage }}
</div>
      <form (ngSubmit)="onLogin()" class="flex flex-col space-y-4">
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Correo"
          required
          class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-300"
        />
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Contraseña"
          required
          class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-300"
        />
        <button
          type="submit"
          class="p-3 bg-teal-400 hover:bg-teal-500 text-white font-bold rounded-lg transition-colors duration-300"
        >
          Iniciar sesión
        </button>
      </form>
    </div>
  </div>
</section>
